name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (builds shared package via postinstall)
        run: npm install

      - name: Type-check + build all workspaces
        run: npm run build

      - name: Run backend test suite
        run: npm test
